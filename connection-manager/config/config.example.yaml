# Connection Manager Configuration
# Copy this file to config.yaml and adjust values

server:
  grpc_port: 50051
  http_port: 8090
  tls_cert_path: "./certs/server.crt"
  tls_key_path: "./certs/server.key"
  ca_cert_path: "./certs/ca.crt"
  
  # gRPC options
  max_concurrent_streams: 1000
  keepalive_time: 30s
  keepalive_timeout: 10s
  max_connection_idle: 5m
  read_timeout: 30s
  write_timeout: 30s
  shutdown_timeout: 30s

database:
  host: "localhost"
  port: 5432
  user: "edr"
  # NEVER hardcode the password here. Provide it via the
  # DATABASE_PASSWORD environment variable (bound by Viper).
  password: ""
  name: "edr"
  ssl_mode: "require"
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 5m
  conn_max_idle_time: 5m

redis:
  addr: "redis:6379"
  # NEVER hardcode the password here. Provide it via the
  # REDIS_PASSWORD environment variable.
  password: ""
  db: 0
  pool_size: 10
  pool_timeout: 30s
  read_timeout: 3s
  write_timeout: 3s
  use_tls: false

jwt:
  private_key_path: "./certs/jwt_private.pem"
  public_key_path: "./certs/jwt_public.pem"
  issuer: "antigravity-server"
  audience: "agent"
  access_ttl: 24h
  refresh_ttl: 2160h  # 90 days

rate_limit:
  events_per_second: 10000
  burst_multiplier: 1.2
  enabled: true

logging:
  level: "info"  # debug, info, warn, error
  format: "json"  # json or text
  output: "stdout"
  time_format: "2006-01-02T15:04:05.000Z07:00"

monitoring:
  enabled: true
  metrics_path: "/metrics"
  health_path: "/healthz"
  tracing_enabled: false
  tracing_backend: "jaeger"  # jaeger or zipkin
