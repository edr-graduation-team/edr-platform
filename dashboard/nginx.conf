# =============================================================================
# EDR Dashboard — Nginx API Gateway & Reverse Proxy
# =============================================================================
#
# ROUTING RULES (explicit, no catch-all overlaps):
#
#   Connection Manager  (http://connection-manager:8082)
#     /api/v1/auth/*
#     /api/v1/agents/*
#     /api/v1/enrollment-tokens/*
#     /api/v1/audit/*
#
#   Sigma Engine  (http://sigma-engine:8080)
#     /api/v1/sigma/*          (includes WebSocket stream)
#     /api/v1/alerts/*
#     /api/v1/rules/*
#     /api/v1/stats/*
#
#   Static SPA  (local filesystem)
#     /*                       (React index.html fallback)
#
# =============================================================================

# --- Upstream definitions (single point of change for backend addresses) ---
upstream connection_manager {
    server connection-manager:8082;
    keepalive 16;
}
upstream sigma_engine {
    server sigma-engine:8080;
    keepalive 16;
}

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # --- Gzip compression ---
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 256;

    # --- Shared proxy settings (DRY) ---
    # Inherited by all proxy_pass blocks below.
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection        "";

    # =========================================================================
    # HEALTH CHECKS
    # =========================================================================

    # Container-level health (Docker HEALTHCHECK)
    location = /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # Connection Manager health passthrough
    location = /healthz {
        proxy_pass http://connection_manager;
    }

    # =========================================================================
    # CONNECTION MANAGER  —  Identity & Agent Management
    # Upstream: http://connection-manager:8082
    # =========================================================================

    # Authentication (login, logout, refresh, register)
    location /api/v1/auth/ {
        proxy_pass http://connection_manager;
    }
    # Exact match for /api/v1/auth (no trailing slash)
    location = /api/v1/auth {
        proxy_pass http://connection_manager;
    }

    # Agent CRUD, commands, status
    location /api/v1/agents/ {
        proxy_pass http://connection_manager;
    }
    location = /api/v1/agents {
        proxy_pass http://connection_manager;
    }

    # Enrollment tokens
    location /api/v1/enrollment-tokens/ {
        proxy_pass http://connection_manager;
    }
    location = /api/v1/enrollment-tokens {
        proxy_pass http://connection_manager;
    }

    # Audit logs
    location /api/v1/audit/ {
        proxy_pass http://connection_manager;
    }
    location = /api/v1/audit {
        proxy_pass http://connection_manager;
    }

    # =========================================================================
    # SIGMA ENGINE  —  Detection & Analytics
    # Upstream: http://sigma-engine:8080
    # =========================================================================

    # WebSocket: real-time alert stream (MUST be above the prefix block)
    location /api/v1/sigma/alerts/stream {
        proxy_pass http://sigma_engine;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout  86400;
        proxy_send_timeout  86400;
    }

    # Sigma engine REST API
    location /api/v1/sigma/ {
        proxy_pass http://sigma_engine;
    }
    location = /api/v1/sigma {
        proxy_pass http://sigma_engine;
    }

    # Alerts
    location /api/v1/alerts/ {
        proxy_pass http://sigma_engine;
    }
    location = /api/v1/alerts {
        proxy_pass http://sigma_engine;
    }

    # Rules
    location /api/v1/rules/ {
        proxy_pass http://sigma_engine;
    }
    location = /api/v1/rules {
        proxy_pass http://sigma_engine;
    }

    # Stats / Dashboard analytics
    location /api/v1/stats/ {
        proxy_pass http://sigma_engine;
    }
    location = /api/v1/stats {
        proxy_pass http://sigma_engine;
    }

    # =========================================================================
    # STATIC SPA  —  React (Vite) Application
    # =========================================================================

    # SPA fallback: serve index.html for all non-API, non-asset routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets (Vite hashed filenames → safe to cache forever)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}