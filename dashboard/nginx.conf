# =============================================================================
# EDR Dashboard — Nginx API Gateway & Reverse Proxy
# =============================================================================
#
# ROUTING RULES (explicit, no catch-all overlaps):
#
#   Connection Manager  (http://connection-manager:8082)
#     /api/v1/auth/*
#     /api/v1/agents/*
#     /api/v1/enrollment-tokens/*
#     /api/v1/audit/*
#     /api/v1/commands/*
#     /api/v1/events/*
#     /api/v1/app-control/*
#
#   Sigma Engine  (http://sigma-engine:8080)
#     /api/v1/sigma/*          (includes WebSocket stream)
#     /api/v1/alerts/*
#     /api/v1/rules/*
#     /api/v1/stats/*
#
#   Static SPA  (local filesystem)
#     /*                       (React index.html fallback)
#
# =============================================================================
#
# WHY NO STATIC `upstream {}` BLOCKS?
# ─────────────────────────────────────────────────────────────────────────────
# Nginx resolves upstream hostnames **once at startup** and caches the IP for
# the entire lifetime of the worker process.  When Docker recreates a container
# (e.g. `docker compose up -d --build connection-manager`), the container gets
# a NEW IP address on the internal Docker bridge network, but Nginx still holds
# the OLD, now-stale IP.  Every proxy_pass attempt hits a dead address → 502.
#
# THE FIX:
#   1. Add `resolver 127.0.0.11 valid=5s` — Docker's embedded DNS server.
#      With `valid=5s`, Nginx re-resolves the hostname every 5 seconds, so a
#      rebuilt container is picked up automatically within one TTL cycle.
#   2. Store the backend address in a `set $var` variable per location.
#      When proxy_pass references a *variable* (not a literal hostname), Nginx
#      is forced to honour the resolver for EVERY request instead of only at
#      startup.  This is the key behaviour difference.
# =============================================================================

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # ── Docker embedded DNS resolver ──────────────────────────────────────────
    # 127.0.0.11 is Docker's internal DNS server (present in every container).
    # valid=5s  → Nginx re-resolves backend hostnames every 5 seconds.
    # ipv6=off  → Skip AAAA lookups (Docker bridge uses IPv4 only).
    resolver 127.0.0.11 valid=5s ipv6=off;

    # --- Gzip compression ---
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 256;

    # --- Shared proxy settings (DRY) ---
    # Inherited by all proxy_pass blocks below.
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection        "";

    # =========================================================================
    # HEALTH CHECKS
    # =========================================================================

    # Container-level health (Docker HEALTHCHECK)
    location = /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # Connection Manager health passthrough
    location = /healthz {
        set $cm_backend http://connection-manager:8082;
        proxy_pass $cm_backend;
    }

    # =========================================================================
    # CONNECTION MANAGER  —  Identity & Agent Management
    # Upstream: http://connection-manager:8082
    # =========================================================================

    # Authentication (login, logout, refresh, register)
    location /api/v1/auth/ {
        set $cm_backend http://connection-manager:8082;
        proxy_pass $cm_backend;
    }
    location = /api/v1/auth {
        set $cm_backend http://connection-manager:8082;
        proxy_pass $cm_backend;
    }

    # Agent CRUD, commands, status
    location /api/v1/agents/ {
        set $cm_backend http://connection-manager:8082;
        proxy_pass $cm_backend;
    }
    location = /api/v1/agents {
        set $cm_backend http://connection-manager:8082;
        proxy_pass $cm_backend;
    }

    # Enrollment tokens
    location /api/v1/enrollment-tokens/ {
        set $cm_backend http://connection-manager:8082;
        proxy_pass $cm_backend;
    }
    location = /api/v1/enrollment-tokens {
        set $cm_backend http://connection-manager:8082;
        proxy_pass $cm_backend;
    }

    # Agent build (cross-compilation — first build can take 3-5 min)
    location /api/v1/agent/ {
        set $cm_backend http://connection-manager:8082;
        proxy_pass $cm_backend;
        proxy_read_timeout  600;
        proxy_send_timeout  600;
        client_max_body_size 100M;
    }
    location = /api/v1/agent/build {
        set $cm_backend http://connection-manager:8082;
        proxy_pass $cm_backend;
        proxy_read_timeout  600;
        proxy_send_timeout  600;
        client_max_body_size 100M;
    }

    # Audit logs
    location /api/v1/audit/ {
        set $cm_backend http://connection-manager:8082;
        proxy_pass $cm_backend;
    }
    location = /api/v1/audit {
        set $cm_backend http://connection-manager:8082;
        proxy_pass $cm_backend;
    }

    # Command history (Action Center)
    location /api/v1/commands/ {
        set $cm_backend http://connection-manager:8082;
        proxy_pass $cm_backend;
    }
    location = /api/v1/commands {
        set $cm_backend http://connection-manager:8082;
        proxy_pass $cm_backend;
    }

    # Events (search, export, single-event detail — Connection Manager)
    location /api/v1/events/ {
        set $cm_backend http://connection-manager:8082;
        proxy_pass $cm_backend;
    }
    location = /api/v1/events {
        set $cm_backend http://connection-manager:8082;
        proxy_pass $cm_backend;
    }

    # Reliability health (ingestion durability / fallback telemetry)
    location = /api/v1/reliability {
        set $cm_backend http://connection-manager:8082;
        proxy_pass $cm_backend;
    }
    location /api/v1/reliability/ {
        set $cm_backend http://connection-manager:8082;
        proxy_pass $cm_backend;
    }

    # User management (RBAC)
    location /api/v1/users/ {
        set $cm_backend http://connection-manager:8082;
        proxy_pass $cm_backend;
    }
    location = /api/v1/users {
        set $cm_backend http://connection-manager:8082;
        proxy_pass $cm_backend;
    }

    # Role management (RBAC)
    location /api/v1/roles/ {
        set $cm_backend http://connection-manager:8082;
        proxy_pass $cm_backend;
    }
    location = /api/v1/roles {
        set $cm_backend http://connection-manager:8082;
        proxy_pass $cm_backend;
    }

    # Permissions listing (RBAC)
    location = /api/v1/permissions {
        set $cm_backend http://connection-manager:8082;
        proxy_pass $cm_backend;
    }

    # Platform configuration
    location /api/v1/config/ {
        set $cm_backend http://connection-manager:8082;
        proxy_pass $cm_backend;
    }
    location = /api/v1/config {
        set $cm_backend http://connection-manager:8082;
        proxy_pass $cm_backend;
    }

    # Context-aware policy management
    location /api/v1/context-policies/ {
        set $cm_backend http://connection-manager:8082;
        proxy_pass $cm_backend;
    }
    location = /api/v1/context-policies {
        set $cm_backend http://connection-manager:8082;
        proxy_pass $cm_backend;
    }

    # Automation — Response playbooks & rules (Connection Manager)
    location /api/v1/automation/ {
        set $cm_backend http://connection-manager:8082;
        proxy_pass $cm_backend;
    }
    location = /api/v1/automation {
        set $cm_backend http://connection-manager:8082;
        proxy_pass $cm_backend;
    }

    # Playbook runs detail (Connection Manager)
    location /api/v1/playbook-runs/ {
        set $cm_backend http://connection-manager:8082;
        proxy_pass $cm_backend;
    }

    # Vulnerability findings (Connection Manager)
    location /api/v1/vuln/ {
        set $cm_backend http://connection-manager:8082;
        proxy_pass $cm_backend;
    }

    # Policies (Connection Manager)
    location /api/v1/policies/ {
        set $cm_backend http://connection-manager:8082;
        proxy_pass $cm_backend;
    }
    location = /api/v1/policies {
        set $cm_backend http://connection-manager:8082;
        proxy_pass $cm_backend;
    }

    # Application Control (process analytics, software inventory, bandwidth)
    location /api/v1/app-control/ {
        set $cm_backend http://connection-manager:8082;
        proxy_pass $cm_backend;
    }

    # SIEM connectors (Connection Manager)
    location /api/v1/siem/ {
        set $cm_backend http://connection-manager:8082;
        proxy_pass $cm_backend;
    }

    # =========================================================================
    # SIGMA ENGINE  —  Detection & Analytics
    # Upstream: http://sigma-engine:8080
    # =========================================================================

    # WebSocket: real-time alert stream (MUST be above the prefix block)
    # NOTE: Any proxy_set_header in a location block disables inheritance of
    # server-level proxy_set_header directives for that location — so we must
    # re-declare all needed headers explicitly here alongside the WS-specific ones.
    location /api/v1/sigma/alerts/stream {
        set $sigma_backend http://sigma-engine:8080;
        proxy_pass $sigma_backend;

        # Standard proxy headers (not inherited because we override below)
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade headers
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout  86400;
        proxy_send_timeout  86400;
    }

    # Sigma engine REST API
    location /api/v1/sigma/ {
        set $sigma_backend http://sigma-engine:8080;
        proxy_pass $sigma_backend;
    }
    location = /api/v1/sigma {
        set $sigma_backend http://sigma-engine:8080;
        proxy_pass $sigma_backend;
    }

    # Alerts — Endpoint Risk Intelligence (served by Connection Manager, not Sigma)
    # Must appear BEFORE the generic /api/v1/alerts/ prefix block.
    location = /api/v1/alerts/endpoint-risk {
        set $cm_backend http://connection-manager:8082;
        proxy_pass $cm_backend;
    }

    # Alerts (all other alert endpoints → Sigma Engine)
    location /api/v1/alerts/ {
        set $sigma_backend http://sigma-engine:8080;
        proxy_pass $sigma_backend;
    }
    location = /api/v1/alerts {
        set $sigma_backend http://sigma-engine:8080;
        proxy_pass $sigma_backend;
    }

    # Rules
    location /api/v1/rules/ {
        set $sigma_backend http://sigma-engine:8080;
        proxy_pass $sigma_backend;
    }
    location = /api/v1/rules {
        set $sigma_backend http://sigma-engine:8080;
        proxy_pass $sigma_backend;
    }

    # Stats / Dashboard analytics
    location /api/v1/stats/ {
        set $sigma_backend http://sigma-engine:8080;
        proxy_pass $sigma_backend;
    }
    location = /api/v1/stats {
        set $sigma_backend http://sigma-engine:8080;
        proxy_pass $sigma_backend;
    }

    # =========================================================================
    # STATIC SPA  —  React (Vite) Application
    # =========================================================================

    # SPA fallback: serve index.html for all non-API, non-asset routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets (Vite hashed filenames → safe to cache forever)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}