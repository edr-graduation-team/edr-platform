title: "Atomic Red Team - T1003 OS Credential Dumping (Aggregated)"
id: edr-atomic-t1003-001
status: stable
level: critical
description: |
  Detects credential-dumping techniques tested by Atomic Red Team.
  Covers T1003.001 (LSASS Memory), T1003.002 (SAM), T1003.003 (NTDS),
  T1003.004 (LSA Secrets), T1003.006 (DCSync). Hardened to reduce false
  positives from legitimate security tools and Windows Defender.
author: EDR Detection Engineering
date: 2026/04/28
logsource:
  category: process_creation
  product: windows
detection:
  # ── T1003.001 LSASS Memory Dump ─────────────────────────────────────
  selection_mimikatz:
    CommandLine|contains:
      - 'sekurlsa::'
      - 'kerberos::list'
      - 'lsadump::'
      - 'privilege::debug'
      - 'token::elevate'
      - 'crypto::capi'
      - 'dpapi::masterkey'
  selection_procdump_lsass:
    Image|endswith: '\procdump.exe'
    CommandLine|contains:
      - 'lsass'
  selection_comsvcs_dump:
    CommandLine|contains:
      - 'comsvcs.dll'
      - 'MiniDump'
      - '#24'
  selection_taskmgr_dump:
    Image|endswith: '\taskmgr.exe'
    CommandLine|contains:
      - 'lsass'
  selection_rundll32_dump:
    Image|endswith: '\rundll32.exe'
    CommandLine|contains:
      - 'comsvcs'
      - 'MiniDump'
  # ── T1003.002 SAM Registry Hive ────────────────────────────────────
  selection_reg_sam_action:
    Image|endswith: '\reg.exe'
    CommandLine|contains:
      - 'save'
      - 'export'
  selection_reg_sam_target:
    CommandLine|contains:
      - 'hklm\sam'
      - 'hklm\security'
      - 'hklm\system'
  # ── T1003.003 NTDS.dit ─────────────────────────────────────────────
  selection_ntdsutil:
    Image|endswith:
      - '\ntdsutil.exe'
    CommandLine|contains:
      - 'ifm'
      - 'snapshot'
      - 'ac i ntds'
  selection_vssadmin_ntds:
    CommandLine|contains|all:
      - 'vssadmin'
      - 'create shadow'
  selection_esentutl:
    Image|endswith: '\esentutl.exe'
    CommandLine|contains:
      - 'ntds.dit'
  # ── T1003.004 LSA Secrets ──────────────────────────────────────────
  selection_lsa_secrets:
    CommandLine|contains:
      - 'lsadump::secrets'
      - 'LsaRetrievePrivateData'
  # ── T1003.006 DCSync ───────────────────────────────────────────────
  selection_dcsync:
    CommandLine|contains:
      - 'lsadump::dcsync'
      - 'GetNCChanges'
      - 'DRSGetNCChanges'
      - 'DSGetNCChanges'
  # ── False positive reduction ────────────────────────────────────────
  filter_defender:
    ParentImage|endswith:
      - '\MsMpEng.exe'
      - '\MpCmdRun.exe'
  filter_backup:
    Image|endswith: '\ntdsutil.exe'
    ParentImage|endswith:
      - '\services.exe'
      - '\svchost.exe'
    CommandLine|contains: 'maintenance'
  condition: >
    (selection_mimikatz or selection_procdump_lsass or selection_comsvcs_dump
    or selection_taskmgr_dump or selection_rundll32_dump
    or (selection_reg_sam_action and selection_reg_sam_target)
    or selection_ntdsutil or selection_vssadmin_ntds or selection_esentutl
    or selection_lsa_secrets or selection_dcsync)
    and not (filter_defender or filter_backup)
falsepositives:
  - Authorised penetration testing with documented change request
  - Windows backup utilities accessing NTDS legitimately
tags:
  - attack.credential_access
  - attack.t1003
  - attack.t1003.001
  - attack.t1003.002
  - attack.t1003.003
  - attack.t1003.004
  - attack.t1003.006
references:
  - https://attack.mitre.org/techniques/T1003/
  - https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1003.001/T1003.001.md
  - https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1003.002/T1003.002.md
