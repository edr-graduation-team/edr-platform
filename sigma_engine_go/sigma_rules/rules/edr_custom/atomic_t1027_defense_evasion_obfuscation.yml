title: "Atomic Red Team - T1027 Obfuscated Files or Information"
id: edr-atomic-t1027-001
status: stable
level: high
description: |
  Detects obfuscation techniques tested by Atomic Red Team. Covers T1027 (Obfuscated
  Files or Information), T1027.001 (Binary Padding), T1027.004 (Compile After Delivery),
  T1027.005 (Indicator Removal from Tools), T1140 (Deobfuscate/Decode Files).
  Focuses on command-line indicators visible in process creation telemetry.
author: EDR Detection Engineering
date: 2026/04/28
logsource:
  category: process_creation
  product: windows
detection:
  # ── T1027 Base64/Encoded PowerShell ────────────────────────────────
  selection_ps_encoded:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - '-enc '
      - '-EncodedCommand '
      - '-e '
      - '-ec '
  selection_ps_encoded_long:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|re: '.*-[eE][nN]?[cC]?\s+[A-Za-z0-9+/=]{40,}'
  # ── T1027.004 Compile After Delivery ───────────────────────────────
  selection_csc_compile:
    Image|endswith:
      - '\csc.exe'
      - '\vbc.exe'
    ParentImage|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
      - '\cmd.exe'
      - '\mshta.exe'
  selection_msbuild_inline:
    Image|endswith: '\MSBuild.exe'
    ParentImage|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
      - '\cmd.exe'
      - '\explorer.exe'
  # ── T1140 Deobfuscate/Decode ───────────────────────────────────────
  selection_certutil_decode:
    Image|endswith: '\certutil.exe'
    CommandLine|contains:
      - '-decode'
      - '-decodehex'
  selection_ps_decode:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - 'FromBase64String'
      - '[Convert]::'
      - 'IO.Compression'
      - 'DeflateStream'
      - 'GZipStream'
      - 'MemoryStream'
  # ── String concatenation evasion in cmd ────────────────────────────
  selection_cmd_concat:
    Image|endswith: '\cmd.exe'
    CommandLine|contains:
      - '^'
      - '%COMSPEC%'
      - 'set '
      - '!='
      - '%~'
  selection_cmd_concat_suspicious:
    Image|endswith: '\cmd.exe'
    CommandLine|re: '.*(\^.){5,}'
  # ── XOR / character manipulation in PowerShell ─────────────────────
  selection_ps_xor:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - '-bxor'
      - '-join'
      - '[char]'
      - 'char]*-'
      - 'replace'
  filter_visual_studio:
    ParentImage|endswith:
      - '\devenv.exe'
      - '\MSBuild.exe'
  filter_dotnet_sdk:
    ParentImage|endswith:
      - '\dotnet.exe'
  condition: >
    (selection_ps_encoded or selection_ps_encoded_long or selection_csc_compile
    or selection_msbuild_inline or selection_certutil_decode or selection_ps_decode
    or selection_cmd_concat_suspicious or selection_ps_xor)
    and not (filter_visual_studio or filter_dotnet_sdk)
falsepositives:
  - Legitimate encoded PowerShell scripts from deployment tools
  - .NET build processes using csc.exe
  - Developer environments compiling inline code
tags:
  - attack.defense_evasion
  - attack.t1027
  - attack.t1027.004
  - attack.t1140
references:
  - https://attack.mitre.org/techniques/T1027/
  - https://attack.mitre.org/techniques/T1140/
  - https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1027/T1027.md
