title: Certutil Download To User Writable Location
id: 2b09c2d4-972e-4f1b-9c5d-6e0a1b2c3d4e
status: stable
description: |
    Detects certutil downloading files to user-writable locations
    like AppData, Temp, or Public folders. This is a high-confidence
    indicator of malicious activity as legitimate use is extremely rare.
author: Detection Engineering Team
date: 2026/01/03
references:
    - https://attack.mitre.org/techniques/T1105/
    - https://lolbas-project.github.io/lolbas/Binaries/Certutil/
logsource:
    product: windows
    category: process_creation
detection:
    selection_img:
        Image|endswith: '\certutil.exe'
    selection_download:
        CommandLine|contains|all:
            - 'urlcache'
            - '-f'
    selection_path:
        CommandLine|contains:
            - '\AppData\'
            - '\Users\Public\'
            - '\Temp\'
            - '\ProgramData\'
            - '%APPDATA%'
            - '%TEMP%'
            - '%PUBLIC%'
            - '%LOCALAPPDATA%'
            - '\Downloads\'
    condition: selection_img and selection_download and selection_path
fields:
    - CommandLine
    - ParentCommandLine
    - ParentImage
    - User
falsepositives:
    - Extremely rare legitimate use
level: critical
tags:
    - attack.command_and_control
    - attack.t1105
    - attack.execution
