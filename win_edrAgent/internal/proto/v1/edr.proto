// EDR Platform - gRPC Service Definition
// Version: 1.0.0
//
// This file defines the core gRPC services for agent-server communication
// including event ingestion, heartbeat monitoring, certificate management,
// and agent registration.
//
// Copied from connection-manager for agent-side code generation.
// go_package set for win-agent internal/pb output.

syntax = "proto3";

package edr.v1;

option go_package = "github.com/edr-platform/win-agent/internal/pb;pb";

import "google/protobuf/timestamp.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/empty.proto";

// ============================================================================
// SERVICE DEFINITION
// ============================================================================

// EventIngestionService handles all agent-to-server communication
service EventIngestionService {
  // StreamEvents - Bidirectional streaming for event ingestion
  // Agent sends EventBatch messages, server responds with CommandBatch
  rpc StreamEvents(stream EventBatch) returns (stream CommandBatch) {}

  // Heartbeat - Periodic health check from agent
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse) {}

  // RequestCertificateRenewal - Agent requests new certificate before expiry
  rpc RequestCertificateRenewal(CertRenewalRequest) returns (CertificateResponse) {}

  // RegisterAgent - Initial agent registration with installation token
  rpc RegisterAgent(AgentRegistrationRequest) returns (AgentRegistrationResponse) {}

  // SendCommandResult - Agent sends command execution result back to server (C2 feedback)
  rpc SendCommandResult(CommandResult) returns (google.protobuf.Empty) {}
}

// ============================================================================
// EVENT INGESTION MESSAGES
// ============================================================================

// EventBatch - Container for multiple events sent by agent
message EventBatch {
  reserved 50 to 60;

  string batch_id = 1;
  string agent_id = 2;
  google.protobuf.Timestamp timestamp = 3;
  Compression compression = 4;
  bytes payload = 5;
  int32 event_count = 6;
  map<string, string> metadata = 7;
  string checksum = 8;
}

enum Compression {
  COMPRESSION_NONE = 0;
  COMPRESSION_GZIP = 1;
  COMPRESSION_SNAPPY = 2;
}

// Event - Individual security event (used when decompressed)
message Event {
  reserved 100 to 110;

  string event_id = 1;
  google.protobuf.Timestamp timestamp = 2;

  oneof event_type {
    ProcessEvent process = 10;
    NetworkEvent network = 11;
    FileEvent file = 12;
    RegistryEvent registry = 13;
    DnsEvent dns = 14;
    AuthEvent auth = 15;
    DriverEvent driver = 16;
    ImageLoadEvent image_load = 17;
    PipeEvent pipe = 18;
    WmiEvent wmi = 19;
    ClipboardEvent clipboard = 20;
  }

  Severity severity = 30;
  EventSource source = 31;
  string raw_data = 32;
}

enum Severity {
  SEVERITY_UNKNOWN = 0;
  SEVERITY_LOW = 1;
  SEVERITY_MEDIUM = 2;
  SEVERITY_HIGH = 3;
  SEVERITY_CRITICAL = 4;
}

message EventSource {
  string hostname = 1;
  string ip_address = 2;
  string os_type = 3;
  string os_version = 4;
  string agent_version = 5;
}

message ProcessEvent {
  string action = 1;
  int64 pid = 10;
  int64 ppid = 11;
  string name = 12;
  string executable = 13;
  string command_line = 14;
  string working_directory = 15;
  string hash_sha256 = 16;
  string hash_md5 = 17;
  string user_name = 20;
  string user_domain = 21;
  string user_sid = 22;
  string parent_name = 30;
  string parent_executable = 31;
  string parent_command_line = 32;
  string integrity_level = 40;
  bool is_elevated = 41;
  string signature_status = 50;
  string signature_issuer = 51;
}

message NetworkEvent {
  string action = 1;
  string direction = 2;
  string protocol = 3;
  string source_ip = 10;
  int32 source_port = 11;
  string destination_ip = 20;
  int32 destination_port = 21;
  string destination_hostname = 22;
  int64 pid = 30;
  string process_name = 31;
  int64 bytes_sent = 40;
  int64 bytes_received = 41;
}

message FileEvent {
  string action = 1;
  string path = 10;
  string name = 11;
  string extension = 12;
  string directory = 13;
  int64 size_bytes = 20;
  string hash_sha256 = 21;
  string previous_path = 30;
  string new_path = 31;
  int64 pid = 40;
  string process_name = 41;
  google.protobuf.Timestamp created_time = 50;
  google.protobuf.Timestamp modified_time = 51;
  google.protobuf.Timestamp accessed_time = 52;
}

message RegistryEvent {
  string action = 1;
  string key_path = 10;
  string value_name = 11;
  string value_type = 12;
  string value_data = 13;
  string previous_data = 14;
  int64 pid = 20;
  string process_name = 21;
}

message DnsEvent {
  string action = 1;
  string query_name = 10;
  string query_type = 11;
  repeated string answers = 12;
  string response_code = 13;
  int64 pid = 20;
  string process_name = 21;
}

message AuthEvent {
  string action = 1;
  string auth_type = 2;
  string user_name = 10;
  string user_domain = 11;
  string user_sid = 12;
  string source_ip = 20;
  string source_hostname = 21;
  string logon_id = 30;
  string failure_reason = 31;
  int32 failure_code = 32;
}

message DriverEvent {
  string action = 1;
  string name = 10;
  string path = 11;
  string hash_sha256 = 12;
  string signature_status = 20;
  string signature_issuer = 21;
}

message ImageLoadEvent {
  string action = 1;
  string path = 10;
  string name = 11;
  string hash_sha256 = 12;
  int64 pid = 20;
  string process_name = 21;
  string signature_status = 30;
  bool is_signed = 31;
}

message PipeEvent {
  string action = 1;
  string pipe_name = 10;
  int64 pid = 20;
  string process_name = 21;
}

message WmiEvent {
  string action = 1;
  string namespace = 10;
  string query = 11;
  string consumer = 12;
  string filter = 13;
  int64 pid = 20;
  string process_name = 21;
}

message ClipboardEvent {
  string action = 1;
  int64 pid = 10;
  string process_name = 11;
  string content_type = 20;
  int32 content_size = 21;
}

// ============================================================================
// COMMAND MESSAGES (Server to Agent)
// ============================================================================

message CommandBatch {
  string batch_id = 1;
  google.protobuf.Timestamp timestamp = 2;
  ServerStatus server_status = 3;
  repeated Command commands = 4;
  string ack_batch_id = 5;
}

enum ServerStatus {
  SERVER_STATUS_OK = 0;
  SERVER_STATUS_DEGRADED = 1;
  SERVER_STATUS_MAINTENANCE = 2;
  SERVER_STATUS_OVERLOADED = 3;
}

message Command {
  string command_id = 1;
  google.protobuf.Timestamp timestamp = 2;
  CommandType type = 3;
  map<string, string> parameters = 4;
  int32 priority = 5;
  google.protobuf.Timestamp expires_at = 6;
}

// CommandResult - Agent-to-server feedback for a completed command (C2 loop closure)
message CommandResult {
  string command_id = 1;
  string agent_id = 2;
  string status = 3;   // SUCCESS, FAILED, TIMEOUT
  string output = 4;
  string error = 5;
  google.protobuf.Duration duration = 6;
  google.protobuf.Timestamp timestamp = 7;
}

enum CommandType {
  COMMAND_TYPE_UNSPECIFIED = 0;
  COMMAND_TYPE_UPDATE_CONFIG = 1;
  COMMAND_TYPE_COLLECT_FORENSICS = 2;
  COMMAND_TYPE_ISOLATE = 3;
  COMMAND_TYPE_UNISOLATE = 4;
  COMMAND_TYPE_RESTART_SERVICE = 5;
  COMMAND_TYPE_UPDATE_AGENT = 6;
  COMMAND_TYPE_TERMINATE_PROCESS = 7;
  COMMAND_TYPE_ADJUST_RATE = 8;
  COMMAND_TYPE_RUN_CMD = 9; // Whitelisted diagnostic commands (agent-enforced)
  COMMAND_TYPE_RESTART = 10;          // Restart the machine (OS-level reboot)
  COMMAND_TYPE_SHUTDOWN = 11;         // Shutdown the machine (OS-level power off)
  COMMAND_TYPE_UPDATE_FILTER_POLICY = 12; // Push new event filtering rules to agent
  COMMAND_TYPE_QUARANTINE_FILE = 13;
  COMMAND_TYPE_BLOCK_IP = 14;
  COMMAND_TYPE_UNBLOCK_IP = 15;
  COMMAND_TYPE_BLOCK_DOMAIN = 16;
  COMMAND_TYPE_UNBLOCK_DOMAIN = 17;
  COMMAND_TYPE_UPDATE_SIGNATURES = 18;
  COMMAND_TYPE_RESTORE_QUARANTINE_FILE = 19;
  COMMAND_TYPE_DELETE_QUARANTINE_FILE = 20;
}

// ============================================================================
// HEARTBEAT MESSAGES
// ============================================================================

message HeartbeatRequest {
  string agent_id = 1;
  google.protobuf.Timestamp timestamp = 2;
  AgentStatus status = 3;
  float cpu_usage = 10;
  int64 memory_used_mb = 11;
  int64 memory_total_mb = 12;
  int64 disk_used_mb = 13;
  int64 disk_total_mb = 14;
  int64 events_generated = 20;
  int64 events_sent = 21;
  int32 queue_depth = 22;
  int64 events_dropped = 23;
  
  // Network telemetry — non-loopback, active IP addresses
  repeated string ip_addresses = 24;
  
  string agent_version = 30;
  int64 cert_expires_at = 40;
}

enum AgentStatus {
  AGENT_STATUS_UNKNOWN = 0;
  AGENT_STATUS_HEALTHY = 1;
  AGENT_STATUS_DEGRADED = 2;
  AGENT_STATUS_CRITICAL = 3;
  AGENT_STATUS_UPDATING = 4;
  AGENT_STATUS_ISOLATED = 5;
}

message HeartbeatResponse {
  string agent_id = 1;
  google.protobuf.Timestamp server_timestamp = 2;
  ServerStatus server_status = 3;
  bool has_pending_commands = 10;
  bool cert_renewal_required = 11;
  bool config_update_available = 12;
  bool agent_update_available = 13;
  bytes new_config = 20;
  int32 recommended_batch_size = 30;
  int32 recommended_interval_ms = 31;
}

// ============================================================================
// CERTIFICATE RENEWAL MESSAGES
// ============================================================================

message CertRenewalRequest {
  string agent_id = 1;
  bytes csr = 2;
  string current_cert_fingerprint = 3;
  string reason = 4;
}

message CertificateResponse {
  bytes certificate = 1;
  bytes ca_chain = 2;
  google.protobuf.Timestamp issued_at = 3;
  google.protobuf.Timestamp expires_at = 4;
  string fingerprint = 5;
  string serial_number = 6;
}

// ============================================================================
// AGENT REGISTRATION MESSAGES
// ============================================================================

message AgentRegistrationRequest {
  string installation_token = 1;
  string agent_id = 2;
  bytes csr = 3;
  string hostname = 10;
  string os_type = 11;
  string os_version = 12;
  int32 cpu_count = 13;
  int64 memory_mb = 14;
  string agent_version = 20;
  repeated string ip_addresses = 30;
  string mac_address = 31;
  map<string, string> tags = 40;
}

message AgentRegistrationResponse {
  string agent_id = 1;
  RegistrationStatus status = 2;
  string message = 3;
  bytes certificate = 10;
  bytes ca_chain = 11;
  string access_token = 20;
  string refresh_token = 21;
  bytes initial_config = 30;
}

enum RegistrationStatus {
  REGISTRATION_STATUS_UNSPECIFIED = 0;
  REGISTRATION_STATUS_PENDING = 1;
  REGISTRATION_STATUS_APPROVED = 2;
  REGISTRATION_STATUS_REJECTED = 3;
}

// ============================================================================
// ERROR CODES
// ============================================================================

enum ErrorCode {
  ERROR_CODE_UNSPECIFIED = 0;
  ERROR_CODE_INVALID_TOKEN = 100;
  ERROR_CODE_EXPIRED_TOKEN = 101;
  ERROR_CODE_REVOKED_TOKEN = 102;
  ERROR_CODE_INVALID_CERTIFICATE = 103;
  ERROR_CODE_EXPIRED_CERTIFICATE = 104;
  ERROR_CODE_REVOKED_CERTIFICATE = 105;
  ERROR_CODE_PERMISSION_DENIED = 200;
  ERROR_CODE_AGENT_NOT_APPROVED = 201;
  ERROR_CODE_AGENT_SUSPENDED = 202;
  ERROR_CODE_INVALID_REQUEST = 300;
  ERROR_CODE_INVALID_BATCH = 301;
  ERROR_CODE_PAYLOAD_TOO_LARGE = 302;
  ERROR_CODE_DUPLICATE_BATCH = 303;
  ERROR_CODE_CHECKSUM_MISMATCH = 304;
  ERROR_CODE_RATE_LIMITED = 400;
  ERROR_CODE_QUOTA_EXCEEDED = 401;
  ERROR_CODE_INTERNAL_ERROR = 500;
  ERROR_CODE_DATABASE_ERROR = 501;
  ERROR_CODE_CACHE_ERROR = 502;
  ERROR_CODE_UNAVAILABLE = 503;
}

message ErrorDetails {
  ErrorCode code = 1;
  string message = 2;
  string request_id = 3;
  google.protobuf.Timestamp timestamp = 4;
  map<string, string> metadata = 5;
}
